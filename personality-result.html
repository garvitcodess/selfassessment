<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Personality Result</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="glass-card result-card">
            <div class="result-animation">
                <div class="pulse-circle"></div>
                <h1>Your Personality</h1>
            </div>
            <div class="personality-words" id="personalityWords">
                <span class="word" id="word1">Creative</span>
                <span class="word" id="word2">Analytical</span>
                <span class="word" id="word3">Empathetic</span>
                <span class="word" id="word4">Adventurous</span>
            </div>
            <p class="result-description" id="resultDescription">
                Based on your responses, you possess a unique blend of traits that make you adaptable and insightful in various situations.
            </p>
            <div class="result-actions">
                <button class="btn-primary" id="retakeTest">Retake Test</button>
                <button class="btn-secondary" id="tryCareerTest">Try Career Assessment</button>
                <button class="btn-secondary" id="shareResult">Share Result</button>
                <button class="btn-secondary" id="goHome">Home</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
