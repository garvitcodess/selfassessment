<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Path</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1>What would you like to explore?</h1>
            <p class="subtitle">Choose your assessment type</p>
            <div class="test-options">
                <div class="test-card" id="personalityTest">
                    <div class="test-icon">🧠</div>
                    <h3>Personality Test</h3>
                    <p>Discover your unique personality traits in just 4 words</p>
                    <button class="btn-secondary">Start Test</button>
                </div>
                <div class="test-card" id="careerTest">
                    <div class="test-icon">💼</div>
                    <h3>Career Counseling</h3>
                    <p>Find the perfect career path based on your strengths</p>
                    <button class="btn-secondary">Start Assessment</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
